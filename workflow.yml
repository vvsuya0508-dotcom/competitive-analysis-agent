    - data:
        code: "import json\nimport re\n\ndef extract_json(text: str) -> dict:\n  \
          \  text = re.sub(r'<think>.*?</think>', '', text, flags=re.DOTALL).strip()\n\
          \    text = re.sub(r'```json|```', '', text).strip()\n    start = text.find('{')\n\
          \    if start == -1:\n        return {}\n    decoder = json.JSONDecoder()\n\
          \    try:\n        data, _ = decoder.raw_decode(text, start)\n        return\
          \ data\n    except:\n        return {}\n\ndef render_feature_matrix(matrix_data:\
          \ dict) -> str:\n    if not matrix_data:\n        return \"暂无数据\\n\"\n \
          \   \n    features = matrix_data.get(\"features\", [])\n    matrix = matrix_data.get(\"\
          matrix\", {})\n    \n    if not features or not matrix:\n        return\
          \ \"暂无数据\\n\"\n    \n    # 表头\n    header = \"| 竞品 | \" + \" | \".join(features)\
          \ + \" |\"\n    divider = \"|---\" * (len(features) + 1) + \"|\"\n    rows\
          \ = []\n    for competitor, values in matrix.items():\n        row = f\"\
          | {competitor} | \" + \" | \".join(values) + \" |\"\n        rows.append(row)\n\
          \    \n    return \"\\n\".join([header, divider] + rows) + \"\\n\"\n\ndef\
          \ main(strategy_text: str, merge_result: str) -> dict:\n    strategy = extract_json(strategy_text)\n\
          \    merge = extract_json(merge_result)\n    \n    product_name = merge.get(\"\
          product_name\", \"目标产品\")\n    product_analysis = merge.get(\"product_analysis\"\
          , {})\n    pricing_analysis = merge.get(\"pricing_analysis\", {})\n    market_analysis\
          \ = merge.get(\"market_analysis\", {})\n    \n    # 构建Markdown报告\n    report\
          \ = f\"\"\"# {product_name} 竞品分析报告\n\n## 一、战略定位\n\n**核心定位**：{strategy.get(\"\
          overall_positioning\", \"暂无\")}\n\n**一句话概括**：{strategy.get(\"core_narrative\"\
          , \"暂无\")}\n\n**差异化核心**：{strategy.get(\"differentiation_strategy\", {}).get(\"\
          core_differentiator\", \"暂无\")}\n\n**支撑点**：\n\"\"\"\n    for point in strategy.get(\"\
          differentiation_strategy\", {}).get(\"supporting_points\", []):\n      \
          \  report += f\"- {point}\\n\"\n\n    report += f\"\"\"\n---\n\n## 二、产品功能矩阵\n\
          \n{render_feature_matrix(product_analysis.get(\"feature_matrix\", {}))}\n\
          \n**差异化机会点**：\n\"\"\"\n    for point in product_analysis.get(\"differentiation_points\"\
          , []):\n        report += f\"- {point}\\n\"\n\n    report += f\"\"\"\n**产品分析总结**：{product_analysis.get(\"\
          summary\", \"暂无\")}\n\n---\n\n## 三、定价策略对比\n\n| 竞品 | 免费版 | 付费版 | 定价模式 |\n\
          |---|---|---|---|\n\"\"\"\n    for item in pricing_analysis.get(\"pricing_comparison\"\
          , []):\n        report += f\"| {item.get('competitor','')} | {item.get('free_tier','')}\
          \ | {item.get('paid_tier','')} | {item.get('pricing_model','')} |\\n\"\n\
          \n    report += f\"\"\"\n**性价比排名**：{' > '.join(pricing_analysis.get(\"value_ranking\"\
          , []))}\n\n**定价分析总结**：{pricing_analysis.get(\"summary\", \"暂无\")}\n\n---\n\
          \n## 四、市场竞争格局\n\n| 竞品 | 份额估计 | 趋势 |\n|---|---|---|\n\"\"\"\n    for item\
          \ in market_analysis.get(\"market_share_data\", []):\n        report +=\
          \ f\"| {item.get('competitor','')} | {item.get('share_estimate','')} | {item.get('trend','')}\
          \ |\\n\"\n\n    report += f\"\"\"\n**增长趋势**：{market_analysis.get(\"growth_trends\"\
          , \"暂无\")}\n\n**市场分析总结**：{market_analysis.get(\"summary\", \"暂无\")}\n\n\
          ---\n\n## 五、行动计划\n\n| 优先级 | 行动 | 时间线 | 预期效果 |\n|---|---|---|---|\n\"\"\"\
          \n    for item in strategy.get(\"action_plan\", []):\n        report +=\
          \ f\"| {item.get('priority','')} | {item.get('action','')} | {item.get('timeline','')}\
          \ | {item.get('expected_impact','')} |\\n\"\n\n    report += f\"\"\"\n---\n\
          \n## 六、风险评估\n\n{strategy.get(\"risk_assessment\", \"暂无\")}\n\n---\n\n##\
          \ 七、综合建议\n\n{strategy.get(\"summary\", \"暂无\")}\n\"\"\"\n    \n    return\
          \ {\"report\": report}"
        code_language: python3
        outputs:
          report:
            children: null
            type: string
