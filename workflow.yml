          \    text = competitor_list_str.strip()\n    text = re.sub(r'<think>.*?</think>',\
          \ '', text, flags=re.DOTALL).strip()\n    text = re.sub(r'```json|```',\
          \ '', text).strip()\n    \n    start = text.find('{')\n    if start == -1:\n\
          \        return {\n            \"competitors_array\": [],\n            \"\
          product_name\": \"\",\n            \"product_category\": \"\"\n        }\n\
          \    \n    decoder = json.JSONDecoder()\n    try:\n        data, _ = decoder.raw_decode(text,\
          \ start)\n    except:\n        return {\n            \"competitors_array\"\
          : [],\n            \"product_name\": \"\",\n            \"product_category\"\
          : \"\"\n        }\n    \n    competitors = data.get(\"competitors\", [])\n\
          \    return {\n        \"competitors_array\": [json.dumps(c, ensure_ascii=False)\
          \ for c in competitors],\n        \"product_name\": data.get(\"product_name\"\
          , \"\"),\n        \"product_category\": data.get(\"product_category\", \"\
          \")\n    }"
