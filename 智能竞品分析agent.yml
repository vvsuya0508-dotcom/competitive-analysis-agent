    - data:
        code: "import json\nimport re\n\ndef main(**kwargs) -> dict:\n    # 用**kwargs接收所有参数，彻底避免参数名不一致问题\n\
          \    name = \"\"\n    data_str = \"\"\n    \n    for k, v in kwargs.items():\n\
          \        if \"name\" in k.lower():\n            name = str(v)\n        if\
          \ \"data\" in k.lower():\n            data_str = str(v)\n    \n    text\
          \ = data_str.strip()\n    text = re.sub(r'<think>.*?</think>', '', text,\
          \ flags=re.DOTALL).strip()\n    text = re.sub(r'```json|```', '', text).strip()\n\
          \    \n    start = text.find('{')\n    if start == -1:\n        return {\n\
          \            \"result\": json.dumps({\n                \"name\": name,\n\
          \                \"error\": \"未找到JSON\",\n                \"raw_text\":\
          \ text[:200],\n                \"data_confidence\": \"LOW\"\n          \
          \  }, ensure_ascii=False)\n        }\n    \n    decoder = json.JSONDecoder()\n\
          \    try:\n        data, _ = decoder.raw_decode(text, start)\n        return\
          \ {\n            \"result\": json.dumps({name: data}, ensure_ascii=False)\n\
          \        }\n    except json.JSONDecodeError as e:\n        return {\n  \
          \          \"result\": json.dumps({\n                \"name\": name,\n \
          \               \"error\": str(e),\n                \"raw_text\": text[start:start+200],\n\
          \                \"data_confidence\": \"LOW\"\n            }, ensure_ascii=False)\n\
          \        }"
