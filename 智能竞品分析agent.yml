    - data:
        answer: '🔍 正在分析{{#sys.query#}}的竞品市场...


          **第一步：竞品发现中**，正在生成搜索关键词并识别核心竞品，请稍候...'
        selected: false
        title: 直接回复 1
        type: answer
        variables: []
      height: 151
      id: '1781137193718'
      position:
        x: 342
        y: 165.83333333333334
      positionAbsolute:
        x: 342
        y: 165.83333333333334
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\nimport re\n\ndef main(queries_json: str) -> dict:\n  \
          \  text = queries_json.strip()\n    text = re.sub(r'<think>.*?</think>',\
          \ '', text, flags=re.DOTALL).strip()\n    text = re.sub(r'```json|```',\
          \ '', text).strip()\n    \n    start = text.find('{')\n    if start == -1:\n\
          \        return {\"query\": \"飞书竞品分析\"}\n    \n    decoder = json.JSONDecoder()\n\
          \    try:\n        data, _ = decoder.raw_decode(text, start)\n        queries\
          \ = data.get(\"queries\", [])\n        if queries:\n            # 只取第一条，截断到380字符以内留余量\n\
          \            query = str(queries[0])[:380]\n            return {\"query\"\
          : query}\n    except:\n        pass\n    \n    return {\"query\": text[:380]}"
        code_language: python3
        outputs:
          query:
            children: null
            type: string
