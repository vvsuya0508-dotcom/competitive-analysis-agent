      - 竞品发现（识别3-8个核心竞品）

      - 多维数据采集（功能/定价/口碑/市场）

      - 三路并行分析

      - 输出结构化竞品报告


      请直接输入产品名称开始分析，例如：飞书、Notion、钉钉'
