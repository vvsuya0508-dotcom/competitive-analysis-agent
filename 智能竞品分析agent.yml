            2. 包含中文关键词为主\n3. 每条关键词简洁，适合直接输入搜索引擎\n\n只输出JSON，不要有任何解释文字，格式如下：\n{\n  \"\
            queries\": [\n    \"关键词1\",\n    \"关键词2\",\n    \"关键词3\"\n  ]\n}\n每条关键词不超过30个字符，保持简洁。"
        - id: 398a32a9-d762-4965-bed4-1afd8fddeee6
          role: user
          text: 产品分析报告：{{#sys.query#}}
        selected: false
        title: queries_json
        type: llm
        vision:
