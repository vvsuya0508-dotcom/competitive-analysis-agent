    - data:
        code: "import json\nimport re\n\ndef main(iterator_selector: list, name: str)\
          \ -> dict:\n    merged = {}\n    errors = []\n    \n    for item in iterator_selector:\n\
          \        if isinstance(item, dict):\n            merged.update(item)\n \
          \       elif isinstance(item, str):\n            text = item.strip()\n \
          \           text = re.sub(r'<think>.*?</think>', '', text, flags=re.DOTALL).strip()\n\
